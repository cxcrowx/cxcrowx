<svg width="1200" height="200" viewBox="0 0 1200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
    .mono    { font-family: 'SF Mono', 'Courier New', monospace; letter-spacing: 3px; }
    .cell { animation: fade .8s ease both; }
    .s1 { animation-delay: .05s } .s2 { animation-delay: .2s } .s3 { animation-delay: .35s }
    @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  </style>

  <rect width="1200" height="200" fill="#0A0A0A"/>
  <text x="60" y="46" class="mono" font-size="12" fill="#FF4D00">004 — ACTIVITY / LAST 12 MONTHS</text>
  <line x1="0" y1="66" x2="1200" y2="66" stroke="#1F1F1F"/>
  <line x1="400" y1="66" x2="400" y2="200" stroke="#1F1F1F"/>
  <line x1="800" y1="66" x2="800" y2="200" stroke="#1F1F1F"/>

  <g class="cell s1">
    <text x="60" y="142" class="display" font-size="52" fill="#FF4D00">2,100+</text>
    <text x="60" y="174" class="mono" font-size="12" fill="#8A8A8A">CONTRIBUTIONS</text>
  </g>
  <g class="cell s2">
    <text x="440" y="142" class="display" font-size="52" fill="#F2F2F2">48</text>
    <text x="440" y="174" class="mono" font-size="12" fill="#8A8A8A">PULL REQUESTS</text>
  </g>
  <g class="cell s3">
    <text x="840" y="142" class="display" font-size="52" fill="#F2F2F2">11</text>
    <text x="840" y="174" class="mono" font-size="12" fill="#8A8A8A">REPOSITORIES</text>
  </g>
</svg>
