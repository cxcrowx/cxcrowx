<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
    .mono    { font-family: 'SF Mono', Menlo, 'Courier New', monospace; letter-spacing: 3px; }
    .r  { opacity: 0; animation: rise .9s cubic-bezier(.16,1,.3,1) forwards; }
    .d1 { animation-delay: .05s } .d2 { animation-delay: .22s } .d3 { animation-delay: .42s }
    .d4 { animation-delay: .60s } .d5 { animation-delay: .78s }
    .blink { animation: blink 1.1s steps(2,start) infinite; }
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 14s linear infinite; }
    .bob   { animation: bob 2.2s ease-in-out infinite; }
    .scan  { animation: scan 9s linear infinite; }
    .draw  { stroke-dasharray: 1080; stroke-dashoffset: 1080; animation: draw 1.4s cubic-bezier(.16,1,.3,1) .4s forwards; }
    @keyframes rise  { from { opacity: 0; transform: translateY(26px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes blink { to { visibility: hidden } }
    @keyframes spin  { to { transform: rotate(360deg) } }
    @keyframes bob   { 0%, 100% { transform: translateY(0) } 50% { transform: translateY(7px) } }
    @keyframes scan  { from { transform: translateY(-120px) } to { transform: translateY(560px) } }
    @keyframes draw  { to { stroke-dashoffset: 0 } }
  </style>
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#F2F2F2"/>
      <stop offset=".40" stop-color="#F2F2F2"/>
      <stop offset=".50" stop-color="#C6FF00"/>
      <stop offset=".60" stop-color="#F2F2F2"/>
      <stop offset="1"   stop-color="#F2F2F2"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1.3 0" to="1.3 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" fill="#0A0A0A"/>

  <!-- vertical grid hairlines -->
  <line x1="60" y1="0" x2="60" y2="520" stroke="#141414"/>
  <line x1="1140" y1="0" x2="1140" y2="520" stroke="#141414"/>

  <!-- corner crosshairs -->
  <g stroke="#2E2E2E">
    <path d="M30 22 V38 M22 30 H38"/>
    <path d="M1170 22 V38 M1162 30 H1178"/>
    <path d="M30 482 V498 M22 490 H38"/>
    <path d="M1170 482 V498 M1162 490 H1178"/>
  </g>

  <!-- drifting scanline -->
  <rect class="scan" width="1200" height="90" fill="#FFFFFF" opacity="0.02"/>

  <!-- top meta row -->
  <g class="r d1">
    <text x="60" y="50" class="mono" font-size="12" fill="#C6FF00">CXCROWX — PROFILE v.02</text>
    <text x="600" y="50" class="mono" font-size="12" fill="#8A8A8A" text-anchor="middle">FRONTEND DEVELOPER</text>
    <text x="1140" y="50" class="mono" font-size="12" fill="#8A8A8A" text-anchor="end">EST. 2026</text>
  </g>
  <line class="draw" x1="60" y1="72" x2="1140" y2="72" stroke="#1F1F1F"/>

  <!-- headline -->
  <g class="r d2">
    <text x="57" y="298" class="display" font-size="176" fill="url(#sheen)" letter-spacing="-4"
          textLength="990" lengthAdjust="spacingAndGlyphs">CXCROWX</text>
    <rect class="blink" x="1072" y="168" width="26" height="130" fill="#C6FF00"/>
  </g>

  <!-- subline -->
  <g class="r d3">
    <text x="60" y="356" class="mono" font-size="14" fill="#F2F2F2" letter-spacing="5">BUILDING INTERFACES THAT FEEL ALIVE</text>
    <text x="1140" y="356" class="mono" font-size="14" fill="#8A8A8A" text-anchor="end">TS / NEXT.JS / REACT</text>
  </g>

  <line class="draw" x1="60" y1="392" x2="1140" y2="392" stroke="#1F1F1F" style="animation-delay:.8s"/>

  <!-- bottom row -->
  <g class="r d4">
    <g class="bob">
      <text x="60" y="470" class="mono" font-size="12" fill="#8A8A8A">SCROLL ↓</text>
    </g>
    <text x="1140" y="470" class="mono" font-size="12" fill="#F2F2F2" text-anchor="end">GITHUB.COM/CXCROWX ↗</text>
  </g>
  <g class="r d5">
    <text x="600" y="470" class="spin mono" font-size="16" fill="#C6FF00" text-anchor="middle">✦</text>
  </g>
</svg>
