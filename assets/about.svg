<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
    .mono { font-family: 'SF Mono', Menlo, 'Courier New', monospace; letter-spacing: 3px; }
    .body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .r  { opacity: 0; animation: rise .9s cubic-bezier(.16,1,.3,1) forwards; }
    .d1 { animation-delay: .05s } .d2 { animation-delay: .20s } .d3 { animation-delay: .35s }
    .d4 { animation-delay: .50s } .d5 { animation-delay: .65s }
    .blink { animation: blink 1.1s steps(2,start) infinite; }
    .tick  { animation: tick 1.8s ease-in-out infinite; }
    .draw  { stroke-dasharray: 1080; stroke-dashoffset: 1080; animation: draw 1.4s cubic-bezier(.16,1,.3,1) .3s forwards; }
    @keyframes rise  { from { opacity: 0; transform: translateY(22px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes blink { to { visibility: hidden } }
    @keyframes tick  { 0%, 100% { transform: translateX(0) } 50% { transform: translateX(8px) } }
    @keyframes draw  { to { stroke-dashoffset: 0 } }
  </style>

  <rect width="1200" height="320" fill="#0A0A0A"/>

  <!-- ghost index -->
  <text x="1136" y="286" class="display" font-size="230" fill="none" stroke="#161616" stroke-width="2" text-anchor="end">01</text>

  <g class="r d1">
    <text x="60" y="52" class="mono" font-size="12" fill="#C6FF00">001 — ABOUT</text>
  </g>
  <line class="draw" x1="60" y1="72" x2="1140" y2="72" stroke="#1F1F1F"/>

  <g class="r d2"><text x="60" y="128" class="body" fill="#F2F2F2">I build interfaces with TypeScript &amp; Next.js —</text></g>
  <g class="r d3"><text x="60" y="164" class="body" fill="#F2F2F2">fast, clean, and with attention to detail.</text></g>
  <g class="r d4">
    <text x="60" y="200" class="body" fill="#C6FF00">Interfaces that feel alive.</text>
    <rect class="blink" x="368" y="180" width="12" height="24" fill="#C6FF00"/>
  </g>

  <g class="r d5">
    <g class="tick"><text x="60" y="256" class="mono" font-size="13" fill="#C6FF00">→</text></g>
    <text x="90" y="256" class="mono" font-size="13" fill="#8A8A8A">currently: exploring AI-powered interfaces</text>
    <g class="tick" style="animation-delay:.9s"><text x="60" y="282" class="mono" font-size="13" fill="#C6FF00">→</text></g>
    <text x="90" y="282" class="mono" font-size="13" fill="#8A8A8A">open to:   interesting projects &amp; collabs</text>
  </g>
</svg>
