<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
    .mono    { font-family: 'SF Mono', Menlo, 'Courier New', monospace; font-size: 13px; letter-spacing: 3px; }
    .r  { opacity: 0; animation: rise .9s cubic-bezier(.16,1,.3,1) forwards; }
    .d1 { animation-delay: .05s } .d2 { animation-delay: .22s } .d3 { animation-delay: .40s } .d4 { animation-delay: .58s }
    .arrow { transform-box: fill-box; animation: nudge 1.6s ease-in-out infinite; }
    .blink { animation: blink 1.1s steps(2,start) infinite; }
    .draw  { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: draw 1.4s cubic-bezier(.16,1,.3,1) .3s forwards; }
    @keyframes rise  { from { opacity: 0; transform: translateY(24px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes nudge { 0%, 100% { transform: translateX(0) } 50% { transform: translateX(18px) } }
    @keyframes blink { to { visibility: hidden } }
    @keyframes draw  { to { stroke-dashoffset: 0 } }
  </style>
  <defs>
    <linearGradient id="fsheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FF4D00"/>
      <stop offset=".42" stop-color="#FF4D00"/>
      <stop offset=".50" stop-color="#FFB08A"/>
      <stop offset=".58" stop-color="#FF4D00"/>
      <stop offset="1"   stop-color="#FF4D00"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1.3 0" to="1.3 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="#0A0A0A"/>

  <g class="r d1">
    <text x="60" y="46" class="mono" fill="#FF4D00">004 — CONTACT</text>
    <circle cx="1010" cy="41" r="4" fill="#FF4D00"/>
    <circle cx="1010" cy="41" r="4" fill="none" stroke="#FF4D00">
      <animate attributeName="r" values="4;12" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="1140" y="46" class="mono" fill="#8A8A8A" text-anchor="end">OPEN FOR WORK</text>
  </g>
  <line class="draw" x1="0" y1="66" x2="1200" y2="66" stroke="#1F1F1F"/>

  <g class="r d2">
    <text x="58" y="170" class="display" font-size="84" fill="#F2F2F2" letter-spacing="-3">LET&#8217;S BUILD</text>
  </g>
  <g class="r d3">
    <text x="58" y="262" class="display" font-size="84" fill="url(#fsheen)" letter-spacing="-3">SOMETHING&#160;</text>
    <rect class="blink" x="580" y="196" width="18" height="66" fill="#FF4D00"/>
  </g>

  <g class="r d3">
    <g class="arrow">
      <line x1="640" y1="234" x2="780" y2="234" stroke="#F2F2F2" stroke-width="6"/>
      <path d="M756 210 L784 234 L756 258" stroke="#F2F2F2" stroke-width="6" fill="none"/>
    </g>
  </g>

  <line class="draw" x1="0" y1="300" x2="1200" y2="300" stroke="#1F1F1F" style="animation-delay:.7s"/>
  <g class="r d4">
    <text x="60" y="338" class="mono" fill="#8A8A8A">© 2026 CXCROWX — DESIGNED &amp; BUILT IN CODE</text>
    <text x="1140" y="338" class="mono" fill="#F2F2F2" text-anchor="end">GITHUB.COM/CXCROWX ↗</text>
  </g>
</svg>
