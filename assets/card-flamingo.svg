<svg width="590" height="300" viewBox="0 0 590 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
    .mono    { font-family: 'SF Mono', Menlo, 'Courier New', monospace; letter-spacing: 2px; }
    .r  { opacity: 0; animation: rise .9s cubic-bezier(.16,1,.3,1) forwards; }
    .d1 { animation-delay: .05s } .d2 { animation-delay: .20s } .d3 { animation-delay: .35s }
    .sweep { animation: sweep 10s linear infinite; }
    .arrow { transform-box: fill-box; animation: nudge 2.4s ease-in-out infinite; }
    .bar { transform: scaleX(0); transform-box: fill-box; transform-origin: left;
           animation: grow 1.3s cubic-bezier(.16,1,.3,1) .6s forwards; }
    @keyframes rise  { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes sweep { to { stroke-dashoffset: -1776 } }
    @keyframes nudge { 0%, 100% { transform: translate(0,0) } 50% { transform: translate(5px,-5px) } }
    @keyframes grow  { to { transform: scaleX(1) } }
  </style>

  <rect width="590" height="300" fill="#0A0A0A"/>
  <rect x="0.5" y="0.5" width="589" height="299" stroke="#1F1F1F"/>
  <rect class="sweep" x="0.5" y="0.5" width="589" height="299" stroke="#FF4D00" stroke-dasharray="90 1686" opacity="0.9"/>
  <rect x="0" y="0" width="6" height="300" fill="#FF4D00"/>

  <g class="r d1">
    <text x="40" y="52" class="mono" font-size="11" fill="#FF4D00">P—A / SLOT GAME</text>
    <circle cx="512" cy="47" r="4" fill="#FF4D00"/>
    <circle cx="512" cy="47" r="4" fill="none" stroke="#FF4D00">
      <animate attributeName="r" values="4;12" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="526" y="52" class="mono" font-size="11" fill="#8A8A8A">PRIVATE</text>
  </g>

  <g class="r d2">
    <text x="38" y="126" class="display" font-size="40" fill="#F2F2F2" letter-spacing="-1">FLAMINGO</text>
    <text x="38" y="172" class="display" font-size="40" fill="#F2F2F2" letter-spacing="-1">FORTUNE FLOW</text>
  </g>

  <g class="r d3">
    <text x="40" y="216" class="mono" font-size="12" fill="#8A8A8A">slot game · react client · lead contributor</text>
    <rect x="40" y="240" width="300" height="3" fill="#1F1F1F"/>
    <rect class="bar" x="40" y="240" width="246" height="3" fill="#FF4D00"/>
    <text x="40" y="274" class="mono" font-size="11" fill="#FF4D00">169 COMMITS</text>
    <g class="arrow">
      <text x="550" y="274" class="display" font-size="26" fill="#F2F2F2" text-anchor="end">↗</text>
    </g>
  </g>
</svg>
